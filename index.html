<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financial Tracker (Tax Included)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial; background: #f4f8f3; padding: 20px; }
    .container { max-width: 1100px; margin: auto; }
    h1 { text-align: center; color: #2e7d32; margin-bottom: 12px; }
    .card { background: white; padding: 15px; border-radius: 12px; margin: 10px 0; }
    input, button { padding: 10px; margin: 5px 0; width: 100%; border-radius: 8px; border: 1px solid #ccc; }
    button { background: #2e7d32; color: white; border: none; }
    table { width: 100%; margin-top: 10px; border-collapse: collapse; }
    th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; }
    th { background: #e8f5e9; }
    @media (max-width: 768px) {
      body { padding: 12px; }
      .card { overflow-x: auto; }
      table { min-width: 760px; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>₱ Financial Tracker (with 20% Tax)</h1>

  <div class="card">
    <h3>Add Bank / Cooperative</h3>
    <input id="name" placeholder="Bank Name / Cooperative">
    <input id="balance" type="number" placeholder="Balance">
    <input id="rate" type="number" placeholder="Interest %">
    <label style="display:block; margin:6px 0; font-size:14px;">
      <input id="isCoop" type="checkbox" style="width:auto; margin-right:8px;">
      Cooperative / Tax-Free
    </label>
    <button onclick="add()">Add</button>
  </div>

  <div class="card">
    <h3>Summary</h3>
    <p>Total Savings: <b id="total">₱0</b></p>
    <p>Total Net Interest: <b id="interest">₱0</b></p>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Bank</th>
          <th>Balance</th>
          <th>Rate</th>
          <th>Gross</th>
          <th>Tax</th>
          <th>Net</th>
          <th>Note</th>
        </tr>
      </thead>
      <tbody id="table"></tbody>
    </table>
  </div>
</div>

<script>
let data = JSON.parse(localStorage.getItem('data')) || [];

function peso(n) {
  return '₱' + Number(n).toLocaleString(undefined, {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  });
}

function add() {
  let name = document.getElementById('name').value;
  let balance = parseFloat(document.getElementById('balance').value);
  let rate = parseFloat(document.getElementById('rate').value);
  let isCoop = document.getElementById('isCoop').checked;

  if (!name || isNaN(balance) || isNaN(rate)) {
    alert('Please complete all fields.');
    return;
  }

  let gross = balance * (rate / 100 / 12);
  let tax = isCoop ? 0 : gross * 0.20;
  let net = gross - tax;
  let note = isCoop ? 'Tax-free cooperative' : '20% tax applied';

  data.push({ name, balance, rate, gross, tax, net, note, isCoop });
  localStorage.setItem('data', JSON.stringify(data));

  document.getElementById('name').value = '';
  document.getElementById('balance').value = '';
  document.getElementById('rate').value = '';
  document.getElementById('isCoop').checked = false;

  render();
}

function render() {
  let tbody = document.getElementById('table');
  tbody.innerHTML = '';

  let total = 0, interest = 0;

  data.forEach(d => {
    total += d.balance;
    interest += d.net;

    tbody.innerHTML += `
      <tr>
        <td>${d.name}</td>
        <td>${peso(d.balance)}</td>
        <td>${d.rate}%</td>
        <td>${peso(d.gross)}</td>
        <td>${peso(d.tax)}</td>
        <td>${peso(d.net)}</td>
        <td>${d.note || (d.isCoop ? 'Tax-free cooperative' : '20% tax applied')}</td>
      </tr>
    `;
  });

  document.getElementById('total').innerText = peso(total);
  document.getElementById('interest').innerText = peso(interest);
}

render();
</script>
</body>
</html>
